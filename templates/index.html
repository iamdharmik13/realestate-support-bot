<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Real Estate Assistant</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Inter',sans-serif; background:#f0f4f8; display:flex; justify-content:center; align-items:center; min-height:100vh; }
  .chat-box { width:420px; height:620px; background:white; border-radius:24px; box-shadow:0 20px 60px rgba(0,0,0,0.12); display:flex; flex-direction:column; overflow:hidden; }
  .header { background:linear-gradient(135deg,#1a3c5e,#2d6a9f); padding:20px 24px; color:white; }
  .header-top { display:flex; align-items:center; gap:12px; }
  .avatar { width:44px; height:44px; background:rgba(255,255,255,0.2); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:20px; }
  .header h2 { font-size:1rem; font-weight:600; }
  .header p { font-size:0.75rem; opacity:0.8; margin-top:2px; }
  .status { display:flex; align-items:center; gap:6px; margin-top:10px; font-size:0.75rem; opacity:0.9; }
  .dot { width:8px; height:8px; background:#00e5a0; border-radius:50%; animation:pulse 1.5s infinite; }
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
  .messages { flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:12px; }
  .messages::-webkit-scrollbar{width:4px}
  .messages::-webkit-scrollbar-thumb{background:#ddd;border-radius:4px}
  .msg { max-width:82%; padding:11px 15px; border-radius:18px; font-size:0.86rem; line-height:1.55; }
  .bot { background:#f0f4f8; color:#1a1a2e; border-bottom-left-radius:4px; align-self:flex-start; }
  .user { background:linear-gradient(135deg,#1a3c5e,#2d6a9f); color:white; border-bottom-right-radius:4px; align-self:flex-end; }
  .typing { align-self:flex-start; background:#f0f4f8; padding:11px 16px; border-radius:18px; border-bottom-left-radius:4px; display:none; gap:4px; }
  .typing span { width:7px; height:7px; background:#999; border-radius:50%; display:inline-block; animation:bounce 1s infinite; }
  .typing span:nth-child(2){animation-delay:.2s}
  .typing span:nth-child(3){animation-delay:.4s}
  @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
  .quick-btns { padding:0 20px 12px; display:flex; gap:8px; flex-wrap:wrap; }
  .quick-btn { background:#f0f4f8; border:1px solid #dde3ea; color:#1a3c5e; padding:6px 12px; border-radius:20px; font-size:0.75rem; cursor:pointer; font-family:'Inter',sans-serif; transition:all 0.2s; font-weight:500; }
  .quick-btn:hover { background:#1a3c5e; color:white; }
  .input-row { padding:16px 20px; border-top:1px solid #f0f0f0; display:flex; gap:8px; align-items:center; }
  input { flex:1; padding:11px 16px; border:1.5px solid #e0e0e0; border-radius:25px; outline:none; font-size:0.86rem; font-family:'Inter',sans-serif; transition:border-color 0.2s; }
  input:focus { border-color:#2d6a9f; }
  .send-btn { width:42px; height:42px; background:linear-gradient(135deg,#1a3c5e,#2d6a9f); color:white; border:none; border-radius:50%; cursor:pointer; font-size:18px; display:flex; align-items:center; justify-content:center; transition:opacity 0.2s; flex-shrink:0; }
  .send-btn:hover{opacity:0.85}
</style>
</head>
<body>
<div class="chat-box">
  <div class="header">
    <div class="header-top">
      <div class="avatar">🏠</div>
      <div>
        <h2>Dream Home Realty</h2>
        <p>AI Property Assistant</p>
      </div>
    </div>
    <div class="status">
      <div class="dot"></div> Online — Replies instantly
    </div>
  </div>
  <div class="messages" id="messages">
    <div class="msg bot">
      👋 Welcome to Dream Home Realty!<br><br>
      I can help you with:<br>
      🏠 Buying or selling property<br>
      🔑 Rentals in Ahmedabad<br>
      💰 Price and loan information<br><br>
      How can I assist you today?
    </div>
  </div>
  <div class="typing" id="typing">
    <span></span><span></span><span></span>
  </div>
  <div class="quick-btns">
    <button class="quick-btn" onclick="quickSend('I want to buy a property')">🏠 Buy</button>
    <button class="quick-btn" onclick="quickSend('I want to rent a property')">🔑 Rent</button>
    <button class="quick-btn" onclick="quickSend('What are your price ranges?')">💰 Prices</button>
    <button class="quick-btn" onclick="quickSend('I need home loan help')">🏦 Loans</button>
  </div>
  <div class="input-row">
    <input type="text" id="userInput" placeholder="Ask about properties..." onkeypress="if(event.key==='Enter') sendMessage()"/>
    <button class="send-btn" onclick="sendMessage()">➤</button>
  </div>
</div>
<script>
  let history = [];
  async function sendMessage() {
    const input = document.getElementById('userInput');
    const msg = input.value.trim();
    if (!msg) return;
    addMsg(msg, 'user');
    input.value = '';
    showTyping(true);
    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({message: msg, history: history})
      });
      const data = await res.json();
      showTyping(false);
      addMsg(data.reply, 'bot');
      history.push(
        {role:'user', parts:[{text: msg}]},
        {role:'model', parts:[{text: data.reply}]}
      );
    } catch(e) {
      showTyping(false);
      addMsg('Sorry, please call us directly!', 'bot');
    }
  }
  function quickSend(msg) {
    document.getElementById('userInput').value = msg;
    sendMessage();
  }
  function addMsg(text, type) {
    const div = document.createElement('div');
    div.className = `msg ${type}`;
    div.textContent = text;
    document.getElementById('messages').appendChild(div);
    div.scrollIntoView({behavior:'smooth'});
  }
  function showTyping(show) {
    const t = document.getElementById('typing');
    t.style.display = show ? 'flex' : 'none';
    if(show) t.scrollIntoView({behavior:'smooth'});
  }
</script>
</body>
</html>
